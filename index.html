<head>
<meta charset="UTF-8">

<title>FrameX Originals — E-Business Card</title>
<style>
  :root{
    --bg:#F5F5F5; --ink:#111111; --ink2:#444444; --black:#0B0B0B;
    --white:#FFFFFF; --lgray:#D9D9D9; --dgray:#6B7280;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    background:var(--bg);min-height:100vh;display:flex;align-items:center;
    justify-content:center;padding:24px;
  }
  .card{
    width:380px;background:var(--white);border:1px solid var(--lgray);
    box-shadow:0 20px 40px rgba(0,0,0,.18);overflow:hidden;position:relative;
  }
  .card::after{
    content:"";position:absolute;top:-70px;right:-70px;width:180px;height:180px;
    border-radius:50%;background:#DADADA;opacity:.55;pointer-events:none;
  }
  .top{padding:26px 26px 20px;position:relative}
  .micro{font-size:9px;letter-spacing:3px;color:var(--dgray);font-weight:600;
    display:flex;justify-content:space-between;align-items:center}
  .rec{width:9px;height:9px;border-radius:50%;background:var(--ink);
    animation:blink 1.6s infinite;position:relative;z-index:1}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  h1{font-size:42px;line-height:.95;letter-spacing:-1.5px;font-weight:900;
     color:var(--ink);margin-top:14px;position:relative;z-index:1}
  h1 span{color:var(--ink);display:block;font-size:34px}
  .rule{width:64px;height:3px;background:var(--ink);margin:14px 0 12px}
  .tagline{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--ink)}
  .tagline i{color:var(--ink);font-style:normal;padding:0 5px}
  /* minimal lens graphic */
  .lens{position:absolute;top:54%;right:24px;transform:translateY(-50%);
    width:78px;height:78px;border:1.5px solid #BDBDBD;border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:1}
  .lens::before{content:"";position:absolute;width:56px;height:56px;
    border:1.2px solid #BDBDBD;border-radius:50%}
  .lens::after{content:"";width:32px;height:32px;border:1.2px solid #BDBDBD;
    border-radius:50%;background:radial-gradient(circle,#BDBDBD 10%,transparent 11%)}
  .dark{background:var(--black);color:var(--white);padding:22px 26px 26px;position:relative}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .actions a{
    display:flex;align-items:center;gap:8px;justify-content:center;
    border:1px solid #2E2E2E;color:var(--white);text-decoration:none;
    font-size:11px;font-weight:600;letter-spacing:1.2px;padding:11px 8px;
    transition:all .18s ease;background:transparent;
  }
  .actions a:hover{background:var(--white);border-color:var(--white);color:var(--ink)}
  .actions svg{width:13px;height:13px;fill:currentColor;flex:none}
  .qrrow{display:flex;align-items:center;gap:16px}
  .qrbox{background:var(--white);padding:7px;border-radius:6px;flex:none;line-height:0}
  .qrbox img{width:96px;height:96px;image-rendering:pixelated}
  .qrtext .s1{font-size:10px;font-weight:800;letter-spacing:2px}
  .qrtext .s2{font-size:11px;color:#9A9A9A;margin-top:4px}
  .qrtext .s3{font-size:9px;letter-spacing:2px;color:var(--dgray);margin-top:12px;font-weight:600}
  .foot{display:flex;justify-content:space-between;align-items:flex-end;
    border-top:1px solid #232323;margin-top:18px;padding-top:12px}
  .bars{display:flex;align-items:flex-end;gap:2px;height:18px}
  .bars b{display:block;background:var(--white);width:2px;height:100%}
  .bars b:nth-child(3n){width:4px}.bars b:nth-child(4n){height:100%;width:1px}
  .foot small{font-size:8px;letter-spacing:2px;color:var(--dgray);font-weight:600}
</style>
</head>
